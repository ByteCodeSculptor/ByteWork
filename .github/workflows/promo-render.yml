name: promo-render

# Triggered by the Vercel route (repository_dispatch) or manually for testing.
on:
  repository_dispatch:
    types: [promo-render]
  workflow_dispatch:
    inputs:
      image_url:
        description: Background image URL (9:16 ideally)
        required: true
        default: https://image.pollinations.ai/prompt/quantum%20computing%20qiskit%20poster%2C%20indigo%20and%20white%2C%20circuit%20motifs?width=1080&height=1920&model=flux
      hook:
        description: On-screen hook text
        required: true
        default: "Quantum project due? Learn it with mentorship."
      caption:
        description: Telegram caption
        required: false
        default: "Test render from the ByteWork promo agent."

jobs:
  render:
    runs-on: ubuntu-latest
    # Values come from EITHER trigger; passed via env so they are never
    # interpolated directly into shell (prevents script injection).
    env:
      IMAGE_URL: ${{ github.event.client_payload.image_url || github.event.inputs.image_url }}
      HOOK: ${{ github.event.client_payload.hook || github.event.inputs.hook }}
      CAPTION: ${{ github.event.client_payload.caption || github.event.inputs.caption }}
      NICHE: ${{ github.event.client_payload.niche || 'manual' }}
      TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Install ffmpeg + ImageMagick
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg imagemagick fonts-dejavu-core

      - name: Fetch + normalize background to 9:16
        run: |
          curl -fsSL "$IMAGE_URL" -o bg.img
          ffmpeg -y -loglevel error -i bg.img \
            -vf "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920" cover.jpg

      - name: Build auto-wrapped caption overlay
        run: |
          convert -size 960x -background none -gravity center \
            -font /usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf -pointsize 60 \
            -stroke black -strokewidth 3 -fill white \
            caption:"$HOOK" caption.png

      - name: Render 9:16 Short (Ken-Burns + caption)
        run: |
          ffmpeg -y -loglevel error -loop 1 -i cover.jpg -i caption.png \
            -f lavfi -i anullsrc=r=44100:cl=stereo -t 10 \
            -filter_complex "[0:v]zoompan=z='min(zoom+0.0012,1.12)':d=300:x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':s=1080x1920:fps=30,format=yuv420p[bg];[bg][1:v]overlay=(W-w)/2:170[v]" \
            -map "[v]" -map 2:a -c:v libx264 -preset veryfast -c:a aac -shortest -movflags +faststart out.mp4
          ls -lh out.mp4

      - name: Upload rendered Short (download here if Telegram is off)
        uses: actions/upload-artifact@v4
        with:
          name: promo-${{ github.run_id }}
          path: out.mp4
          retention-days: 14

      - name: Send to Telegram
        if: ${{ env.TG_TOKEN != '' && env.TG_CHAT != '' }}
        run: |
          curl -fsS -F chat_id="$TG_CHAT" -F caption="$CAPTION" -F video=@out.mp4 \
            "https://api.telegram.org/bot${TG_TOKEN}/sendVideo" -o /dev/null
          echo "Posted Short to Telegram."
